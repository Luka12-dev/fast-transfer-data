<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Transfer</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1A4A38;
            --secondary: #328B53;
            --accent: #44C975;
            --bg: #0F0F0F;
            --surface: rgba(22, 22, 22, 0.7);
            --surface-solid: #161616;
            --border: #222222;
            --border-light: #2a2a2a;
            --text-primary: #FFFFFF;
            --text-muted: #666666;
            --text-dim: #CFCFCF;
            --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        /* Background effects */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(26, 74, 56, 0.25) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(68, 201, 117, 0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(68, 201, 117, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(68, 201, 117, 0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        .app {
            width: 100%;
            max-width: 520px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            margin-bottom: 40px;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 6px;
        }

        .logo-mark {
            width: 36px;
            height: 36px;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo-mark svg {
            width: 18px;
            height: 18px;
            fill: #0F0F0F;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #fff;
        }

        .header-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-left: 50px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        /* Glass card */
        .glass-card {
            background: rgba(16, 16, 16, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 32px;
        }

        /* Tabs */
        .mode-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            margin-bottom: 32px;
            border: 1px solid var(--border);
            background: var(--surface-solid);
        }

        .tab {
            padding: 13px 24px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            border: none;
            background: transparent;
            font-family: var(--font-body);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: color 0.15s, background 0.15s;
            position: relative;
        }

        .tab.active {
            background: #fff;
            color: #000;
        }

        .tab:hover:not(.active) {
            color: var(--text-dim);
            background: rgba(255,255,255,0.03);
        }

        /* Panels */
        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        /* Drop Zone */
        .drop-zone {
            border: 1px dashed rgba(255,255,255,0.12);
            padding: 52px 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: rgba(255,255,255,0.02);
            position: relative;
            overflow: hidden;
        }

        .drop-zone::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(68, 201, 117, 0.03) 0%, transparent 60%);
            pointer-events: none;
        }

        .drop-zone:hover,
        .drop-zone.drag {
            border-color: var(--accent);
            background: rgba(68, 201, 117, 0.04);
        }

        .drop-zone.has-file {
            border-color: rgba(68, 201, 117, 0.4);
            border-style: solid;
            background: rgba(68, 201, 117, 0.04);
        }

        .dz-icon {
            width: 44px;
            height: 44px;
            margin: 0 auto 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dz-icon svg {
            width: 44px;
            height: 44px;
            stroke: rgba(255,255,255,0.2);
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: square;
        }

        .drop-zone.drag .dz-icon svg,
        .drop-zone.has-file .dz-icon svg {
            stroke: var(--accent);
        }

        .drop-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.2px;
        }

        .drop-hint {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        /* File Preview */
        .file-preview {
            display: none;
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            padding: 18px 20px;
            margin-top: 12px;
        }

        .file-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .file-type-badge {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
            flex-shrink: 0;
        }

        .file-type-badge.png { background: rgba(102, 126, 234, 0.15); color: #667eea; border: 1px solid rgba(102,126,234,0.25); }
        .file-type-badge.mp4 { background: rgba(245, 87, 108, 0.15); color: #f5576c; border: 1px solid rgba(245,87,108,0.25); }
        .file-type-badge.mp3 { background: rgba(79, 172, 254, 0.15); color: #4facfe; border: 1px solid rgba(79,172,254,0.25); }
        .file-type-badge.jpg,
        .file-type-badge.jpeg { background: rgba(68, 201, 117, 0.15); color: var(--accent); border: 1px solid rgba(68,201,117,0.25); }
        .file-type-badge.gif { background: rgba(251, 191, 36, 0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
        .file-type-badge.webp { background: rgba(167, 139, 250, 0.15); color: #a78bfa; border: 1px solid rgba(167,139,250,0.25); }
        .file-type-badge.svg { background: rgba(251, 146, 60, 0.15); color: #fb923c; border: 1px solid rgba(251,146,60,0.25); }
        .file-type-badge.default { background: rgba(255,255,255,0.05); color: var(--text-muted); border: 1px solid var(--border); }

        .file-meta {
            flex: 1;
            min-width: 0;
        }

        .file-name-text {
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }

        .file-size-text {
            font-size: 12px;
            color: var(--text-muted);
            font-family: var(--font-mono);
        }

        /* Progress Ring */
        .progress-ring {
            width: 44px;
            height: 44px;
            position: relative;
            flex-shrink: 0;
        }

        .progress-ring svg {
            transform: rotate(-90deg);
        }

        .progress-ring circle {
            fill: none;
            stroke-width: 2.5;
        }

        .progress-bg { stroke: rgba(255,255,255,0.06); }
        .progress-fill {
            stroke: var(--accent);
            stroke-linecap: butt;
            transition: stroke-dashoffset 0.3s ease;
        }

        .progress-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            font-family: var(--font-mono);
            color: var(--accent);
        }

        /* Speed bar */
        .speed-bar {
            display: none;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }

        .speed-value {
            font-family: var(--font-mono);
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px 24px;
            border: none;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s;
            margin-top: 12px;
            font-family: var(--font-body);
            letter-spacing: 0.8px;
            text-transform: uppercase;
        }

        .btn-primary {
            background: #fff;
            color: #000;
            box-shadow: rgba(255,255,255,0.1) 0px 10px 15px -3px, rgba(255,255,255,0.1) 0px 4px 6px -4px;
        }

        .btn-primary:hover:not(:disabled) {
            background: #e8e8e8;
        }

        .btn-primary:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--surface-solid);
            color: var(--text-dim);
            border: 1px solid #333;
        }

        .btn-secondary:hover {
            background: #1e1e1e;
        }

        .btn-accent {
            background: var(--accent);
            color: #000;
            font-weight: 700;
        }

        .btn-accent:hover:not(:disabled) {
            background: #3db869;
        }

        /* Room Code */
        .room-code-section {
            display: none;
            margin-top: 16px;
        }

        .room-code-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .room-code-display {
            background: rgba(68, 201, 117, 0.06);
            border: 1px solid rgba(68, 201, 117, 0.2);
            padding: 20px;
            font-family: var(--font-mono);
            font-size: 36px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 12px;
            color: var(--accent);
            text-indent: 12px;
        }

        .room-code-hint {
            font-size: 12px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 10px;
        }

        /* Code Input */
        .code-input-wrap {
            position: relative;
        }

        .code-input {
            width: 100%;
            background: var(--surface-solid);
            border: 1px solid var(--border);
            padding: 20px;
            font-family: var(--font-mono);
            font-size: 36px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 12px;
            color: #fff;
            text-transform: uppercase;
            outline: none;
            transition: border-color 0.2s;
            text-indent: 12px;
        }

        .code-input::placeholder {
            color: rgba(255,255,255,0.08);
            letter-spacing: 12px;
        }

        .code-input:focus {
            border-color: var(--accent);
        }

        /* Status */
        .status {
            padding: 12px 16px;
            margin-top: 12px;
            font-size: 13px;
            font-weight: 500;
            display: none;
            border-left: 2px solid;
        }

        .status.show { display: block; }

        .status.info {
            background: rgba(59,130,246,0.06);
            color: #60a5fa;
            border-color: #3b82f6;
        }

        .status.success {
            background: rgba(68, 201, 117, 0.06);
            color: var(--accent);
            border-color: var(--accent);
        }

        .status.error {
            background: rgba(239,68,68,0.06);
            color: #f87171;
            border-color: #ef4444;
        }

        /* Divider */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 24px 0;
        }

        /* Input (hidden) */
        input[type="file"] { display: none; }

        /* Supported formats */
        .formats-row {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .format-chip {
            font-size: 10px;
            font-weight: 700;
            font-family: var(--font-mono);
            letter-spacing: 0.5px;
            padding: 4px 8px;
            border: 1px solid var(--border);
            color: var(--text-muted);
            background: transparent;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); }

        @media (max-width: 540px) {
            body { padding: 16px; }
            .glass-card { padding: 24px 20px; }
            .room-code-display, .code-input { font-size: 28px; letter-spacing: 8px; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <div class="app">
        <div class="header">
            <div class="logo-row">
                <div class="logo-mark">
                    <svg viewBox="0 0 24 24">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </div>
                <span class="logo-text">Fast Transfer</span>
            </div>
            <p class="header-sub">Peer-to-peer file sharing — no servers, no limits</p>
        </div>

        <div class="glass-card">
            <div class="mode-tabs">
                <button class="tab active" data-tab="send">Send</button>
                <button class="tab" data-tab="receive">Receive</button>
            </div>

            <!-- Send Panel -->
            <div class="panel active" id="sendPanel">
                <div class="drop-zone" id="dropZone">
                    <div class="dz-icon">
                        <svg viewBox="0 0 24 24">
                            <polyline points="16 16 12 12 8 16"/>
                            <line x1="12" y1="12" x2="12" y2="21"/>
                            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
                        </svg>
                    </div>
                    <div class="drop-title">Drop your file here</div>
                    <div class="drop-hint">or click to browse</div>
                </div>

                <div class="formats-row">
                    <span class="format-chip">PNG</span>
                    <span class="format-chip">JPG</span>
                    <span class="format-chip">JPEG</span>
                    <span class="format-chip">WEBP</span>
                    <span class="format-chip">GIF</span>
                    <span class="format-chip">SVG</span>
                    <span class="format-chip">MP4</span>
                    <span class="format-chip">MP3</span>
                    <span class="format-chip">2GB MAX</span>
                </div>

                <input type="file" id="fileInput" accept=".png,.jpg,.jpeg,.webp,.gif,.svg,.mp4,.mp3,image/*,video/mp4,audio/mpeg">

                <div class="file-preview" id="filePreview">
                    <div class="file-row">
                        <div class="file-type-badge default" id="fileTypeBadge">—</div>
                        <div class="file-meta">
                            <div class="file-name-text" id="fileName"></div>
                            <div class="file-size-text" id="fileSize"></div>
                        </div>
                        <div class="progress-ring" id="progressRing" style="display:none;">
                            <svg width="44" height="44">
                                <circle class="progress-bg" cx="22" cy="22" r="18"/>
                                <circle class="progress-fill" id="progressCircle" cx="22" cy="22" r="18"
                                    stroke-dasharray="113.1"
                                    stroke-dashoffset="113.1"/>
                            </svg>
                            <div class="progress-text" id="progressText">0%</div>
                        </div>
                    </div>
                    <div class="speed-bar" id="speedBar">
                        <span id="transferStatus">Waiting for receiver...</span>
                        <span class="speed-value" id="transferSpeed">— MB/s</span>
                    </div>
                </div>

                <button class="btn btn-primary" id="createRoomBtn" disabled>Create Room</button>

                <div class="room-code-section" id="roomCodeSection">
                    <div class="divider"></div>
                    <div class="room-code-label">Room Code</div>
                    <div class="room-code-display" id="roomCode"></div>
                    <p class="room-code-hint">Share this code with the receiver</p>
                </div>

                <div class="status info" id="sendStatus"></div>
            </div>

            <!-- Receive Panel -->
            <div class="panel" id="receivePanel">
                <div class="room-code-label" style="margin-bottom:10px;">Enter Room Code</div>
                <div class="code-input-wrap">
                    <input
                        type="text"
                        class="code-input"
                        id="codeInput"
                        placeholder="XXXXXX"
                        maxlength="6"
                        autocomplete="off"
                        spellcheck="false"
                    >
                </div>

                <button class="btn btn-primary" id="joinBtn" disabled>Join Room</button>
                <button class="btn btn-accent" id="downloadBtn" style="display:none;">Download File</button>

                <div class="status info" id="receiveStatus"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { Peer } from 'https://cdn.jsdelivr.net/npm/peerjs@1.5.4/+esm';

        // State
        let myPeer = null;
        let currentConn = null;
        let selectedFile = null;
        let receivedFile = null;

        // DOM refs
        const tabs = document.querySelectorAll('.tab');
        const panels = document.querySelectorAll('.panel');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const filePreview = document.getElementById('filePreview');
        const fileTypeBadge = document.getElementById('fileTypeBadge');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const progressRing = document.getElementById('progressRing');
        const progressCircle = document.getElementById('progressCircle');
        const progressText = document.getElementById('progressText');
        const speedBar = document.getElementById('speedBar');
        const transferStatus = document.getElementById('transferStatus');
        const transferSpeed = document.getElementById('transferSpeed');
        const createRoomBtn = document.getElementById('createRoomBtn');
        const roomCodeSection = document.getElementById('roomCodeSection');
        const roomCode = document.getElementById('roomCode');
        const sendStatus = document.getElementById('sendStatus');
        const codeInput = document.getElementById('codeInput');
        const joinBtn = document.getElementById('joinBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const receiveStatus = document.getElementById('receiveStatus');

        // Tab switching
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                panels.forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Panel').classList.add('active');
            });
        });

        // Drop zone events
        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', e => {
            e.preventDefault();
            dropZone.classList.add('drag');
        });

        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag'));

        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('drag');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', e => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        // Accepted types
        const ALLOWED_EXTENSIONS = ['png', 'jpg', 'jpeg', 'webp', 'gif', 'svg', 'mp4', 'mp3'];

        function getExt(name) {
            return name.split('.').pop().toLowerCase();
        }

        function handleFile(file) {
            const ext = getExt(file.name);

            if (!ALLOWED_EXTENSIONS.includes(ext)) {
                showStatus(sendStatus, 'Unsupported file type. Allowed: PNG, JPG, JPEG, WEBP, GIF, SVG, MP4, MP3', 'error');
                return;
            }

            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatSize(file.size);

            // Badge
            fileTypeBadge.textContent = ext.toUpperCase();
            fileTypeBadge.className = 'file-type-badge ' + ext;

            dropZone.classList.add('has-file');
            filePreview.style.display = 'block';
            createRoomBtn.disabled = false;

            sendStatus.className = 'status';
            sendStatus.textContent = '';
        }

        // Create Room
        createRoomBtn.addEventListener('click', createRoom);

        function createRoom() {
            createRoomBtn.disabled = true;
            showStatus(sendStatus, 'Initializing...', 'info');

            const roomId = generateRoomCode();

            myPeer = new Peer(roomId, {
                debug: 0,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });

            myPeer.on('open', id => {
                roomCode.textContent = id.toUpperCase();
                roomCodeSection.style.display = 'block';
                progressRing.style.display = 'block';
                speedBar.style.display = 'flex';
                transferStatus.textContent = 'Waiting for receiver...';
                showStatus(sendStatus, 'Room created. Share the code above.', 'success');
            });

            myPeer.on('connection', conn => {
                currentConn = conn;
                showStatus(sendStatus, 'Receiver connected — starting transfer...', 'info');

                conn.on('open', () => {
                    setTimeout(() => sendFile(conn), 400);
                });
            });

            myPeer.on('error', err => {
                console.error(err);
                if (err.type === 'unavailable-id') {
                    showStatus(sendStatus, 'Room code conflict — please try again.', 'error');
                } else {
                    showStatus(sendStatus, 'Error: ' + err.type, 'error');
                }
                createRoomBtn.disabled = false;
            });
        }

        function sendFile(conn) {
            if (!selectedFile) return;

            transferStatus.textContent = 'Sending...';
            showStatus(sendStatus, 'Transfer in progress...', 'info');

            const chunkSize = 16384;
            const totalChunks = Math.ceil(selectedFile.size / chunkSize);
            let currentChunk = 0;
            let offset = 0;
            let bytesSent = 0;
            const startTime = Date.now();

            conn.send({
                type: 'metadata',
                name: selectedFile.name,
                size: selectedFile.size,
                mimeType: selectedFile.type,
                chunks: totalChunks
            });

            const reader = new FileReader();

            function readNext() {
                if (offset >= selectedFile.size) {
                    conn.send({ type: 'complete' });
                    transferStatus.textContent = 'Complete';
                    showStatus(sendStatus, 'File sent successfully.', 'success');
                    updateProgress(100);
                    return;
                }
                reader.readAsArrayBuffer(selectedFile.slice(offset, offset + chunkSize));
            }

            reader.onload = e => {
                conn.send({ type: 'chunk', index: currentChunk, data: e.target.result });

                const len = e.target.result.byteLength;
                offset += len;
                bytesSent += len;
                currentChunk++;

                const pct = (offset / selectedFile.size) * 100;
                updateProgress(pct);

                const elapsed = (Date.now() - startTime) / 1000;
                const mbps = bytesSent / elapsed / 1024 / 1024;
                transferSpeed.textContent = mbps.toFixed(1) + ' MB/s';

                readNext();
            };

            readNext();
        }

        function updateProgress(pct) {
            const circumference = 2 * Math.PI * 18;
            progressCircle.style.strokeDashoffset = circumference - (pct / 100) * circumference;
            progressText.textContent = Math.round(pct) + '%';
        }

        // Join Room
        codeInput.addEventListener('input', e => {
            e.target.value = e.target.value.replace(/[^A-Z0-9]/gi, '').toUpperCase();
            joinBtn.disabled = e.target.value.length !== 6;
        });

        joinBtn.addEventListener('click', () => {
            const code = codeInput.value.trim().toUpperCase();
            if (code.length !== 6) return;

            joinBtn.disabled = true;
            showStatus(receiveStatus, 'Connecting...', 'info');

            myPeer = new Peer(null, {
                debug: 0,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            });

            myPeer.on('open', () => {
                showStatus(receiveStatus, 'Joining room ' + code + '...', 'info');

                const conn = myPeer.connect(code, { reliable: true });
                currentConn = conn;
                receivedFile = { chunks: [], metadata: null };

                conn.on('open', () => {
                    showStatus(receiveStatus, 'Connected — waiting for file...', 'info');
                });

                conn.on('data', data => {
                    if (data.type === 'metadata') {
                        receivedFile.metadata = data;
                        receivedFile.totalChunks = data.chunks;
                        receivedFile.chunks = new Array(data.chunks);
                        showStatus(receiveStatus, 'Receiving: ' + data.name, 'info');
                    } else if (data.type === 'chunk') {
                        receivedFile.chunks[data.index] = data.data;
                        const received = receivedFile.chunks.filter(Boolean).length;
                        updateProgress((received / receivedFile.totalChunks) * 100);
                    } else if (data.type === 'complete') {
                        assembleFile();
                        showStatus(receiveStatus, 'File received — ready to download.', 'success');
                        downloadBtn.style.display = 'block';
                        joinBtn.style.display = 'none';
                    }
                });

                conn.on('error', err => {
                    showStatus(receiveStatus, 'Connection error: ' + err.type, 'error');
                    joinBtn.disabled = false;
                });

                conn.on('close', () => {
                    showStatus(receiveStatus, 'Connection closed.', 'error');
                });
            });

            myPeer.on('error', err => {
                if (err.type === 'peer-unavailable') {
                    showStatus(receiveStatus, 'Room not found. Check the code and try again.', 'error');
                } else {
                    showStatus(receiveStatus, 'Error: ' + err.type, 'error');
                }
                joinBtn.disabled = false;
            });
        });

        function assembleFile() {
            const blob = new Blob(receivedFile.chunks, { type: receivedFile.metadata.mimeType });
            receivedFile.blob = blob;
            receivedFile.name = receivedFile.metadata.name;
        }

        downloadBtn.addEventListener('click', () => {
            if (!receivedFile?.blob) return;
            const url = URL.createObjectURL(receivedFile.blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = receivedFile.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        // Utilities
        function generateRoomCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            return Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
        }

        function formatSize(bytes) {
            if (!bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
        }

        function showStatus(el, msg, type) {
            el.textContent = msg;
            el.className = 'status show ' + type;
        }
    </script>
</body>
</html>
